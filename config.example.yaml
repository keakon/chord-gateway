# Example gateway configuration.
#
# The gateway looks for config in this order:
#   1. --config flag
#   2. $CHORD_GATEWAY_CONFIG
#   3. $XDG_CONFIG_HOME/chord-gateway/config.yaml
#   4. ~/.config/chord-gateway/config.yaml
#
# Runtime state (logs, WeChat QR-login tokens, dedupe, session pins) goes to:
#   1. $CHORD_GATEWAY_STATE_DIR
#   2. $XDG_STATE_HOME/chord-gateway
#   3. ~/.local/state/chord-gateway
#
# The following are the required sections.

# --- IM Platform Configuration ---
# Configure every IM adapter explicitly under `ims`.
# Each item contains exactly one platform block.
ims:
  - wechat:
      base_url: https://ilinkai.weixin.qq.com  # optional, defaults to this
      workspace_id: project-a                  # required when more than one workspace exists
      # Optional. Defaults to <state_dir>/wechat/token.json.
      # Use this only when you want to store the WeChat QR-login session token elsewhere.
      # token_path: ~/.local/state/chord-gateway/wechat/token.json

  # - feishu:
  #     app_id: cli_xxx
  #     app_secret: xxx
  #     listen: ":8080"
  #     webhook_path: /feishu/callback
  #     owner_open_id: ou_owner_xxx
  #     allowed_open_ids:
  #       - ou_owner_xxx
  #       - ou_user2
  #     chat_bindings:
  #       oc_chat_project_a: project-a
  #       oc_chat_project_b: project-b

# --- Workspace Definitions ---
# Workspaces only define project directories.
workspaces:
  - id: project-a
    path: ~/work/project-a

  # - id: project-b
  #   path: ~/work/project-b

# --- Chord Binary ---
# Path to the chord binary. Supports ~ expansion.
# Shell aliases are NOT supported because the gateway uses exec directly;
# use an absolute/~/path or add the binary's directory to your PATH.
chord_path: chord

# --- Session Idle Timeout ---
# How long to wait before terminating an idle chord process.
idle_timeout: 30m

# --- Optional: Control-Plane Event Subscriptions ---
# Only non-essential events are controllable here. Essential events
# (assistant_message, confirm_request, question_request, idle, error,
# notification) are always subscribed.
event_visibility:
  activity: false
  agent_done: false
  info: false
  toast: false
  tool_result: false
  todos: false

# --- Optional: Session Pins Store ---
# Path to the session pin store (one pin per binding: workspaceID|imType|chatID).
# If omitted, defaults to <state_dir>/session-pins.json.
# session_pins_file: ~/.local/state/chord-gateway/session-pins.json
