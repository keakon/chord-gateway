name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clone chord
        shell: bash
        run: |
          set -euo pipefail
          git clone --branch main --single-branch https://github.com/keakon/chord ../chord

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run Go quality checks
        env:
          MIN_COVERAGE: "60.0"
        run: |
          scripts/check-go-quality.sh

      - name: Check gofmt
        shell: bash
        run: |
          set -euo pipefail
          out="$(gofmt -l .)"
          if [[ -n "${out}" ]]; then
            echo "The following files are not gofmt-formatted:"
            echo "${out}"
            exit 1
          fi

  build:
    name: Build binaries (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          ext=""
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            ext=".exe"
          fi
          out="dist/chord-gateway-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath \
              -ldflags "-s -w -X main.version=${GITHUB_REF_NAME:-dev}" \
              -o "${out}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: chord-gateway-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          if-no-files-found: error
