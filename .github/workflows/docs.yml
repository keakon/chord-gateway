name: docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "website/**"
      - "scripts/check-docs.py"
      - "scripts/sync-docs.mjs"
      - "README.md"
      - "README_CN.md"
      - "QUICKSTART.md"
      - "QUICKSTART_CN.md"
      - "CHANGELOG.md"
      - "CHANGELOG_CN.md"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "website/**"
      - "scripts/check-docs.py"
      - "scripts/sync-docs.mjs"
      - "README.md"
      - "README_CN.md"
      - "QUICKSTART.md"
      - "QUICKSTART_CN.md"
      - "CHANGELOG.md"
      - "CHANGELOG_CN.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-check:
    name: Check documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run docs checks
        run: python3 scripts/check-docs.py

  build:
    name: Build site
    runs-on: ubuntu-latest
    needs: docs-check
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages-deploy
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
